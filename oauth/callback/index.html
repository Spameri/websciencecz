<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebScience - OAuth Callback</title>
    <style>
        body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 80px auto; padding: 20px; text-align: center; }
        .code-box { background: #f0f0f0; border: 2px solid #333; border-radius: 8px; padding: 20px; margin: 20px 0; font-family: monospace; font-size: 18px; word-break: break-all; user-select: all; }
        .success { color: #2e7d32; }
        .error { color: #c62828; }
        button { background: #1976d2; color: white; border: none; padding: 10px 24px; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #1565c0; }
        .copied { color: #2e7d32; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>WebScience OAuth</h1>
    <div id="result"></div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');
        const resultDiv = document.getElementById('result');

        if (code) {
            resultDiv.innerHTML = `
                <p class="success">Authorization successful!</p>
                <p>Copy this code and send it to MrSpamer on Discord:</p>
                <div class="code-box" id="code">${code}</div>
                <button onclick="copyCode()">Copy Code</button>
                <div id="copied"></div>
            `;
        } else if (error) {
            resultDiv.innerHTML = `<p class="error">Error: ${error}</p><p>${params.get('error_description') || ''}</p>`;
        } else {
            resultDiv.innerHTML = `<p class="error">No authorization code received.</p>`;
        }

        function copyCode() {
            navigator.clipboard.writeText(document.getElementById('code').textContent);
            document.getElementById('copied').innerHTML = '<p class="copied">Copied!</p>';
        }
    </script>
</body>
</html>
